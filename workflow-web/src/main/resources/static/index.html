<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/agent-studio.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting To Agent Studio</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #efe4d3, #faf5ed);
            color: #182226;
            font-family: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .card {
            width: min(560px, calc(100vw - 32px));
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(24, 34, 38, 0.08);
            box-shadow: 0 18px 40px rgba(55, 40, 22, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0;
            line-height: 1.8;
            color: rgba(24, 34, 38, 0.72);
        }

        a {
            color: #0f6d70;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Opening Agent Studio</h1>
    <p>
        The default page now redirects to the live Agent Studio experience.
        If your browser does not redirect automatically, open
        <a href="/agent-studio.html">/agent-studio.html</a>.
    </p>
</div>
</body>
</html>
